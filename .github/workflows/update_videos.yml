name: Update Daily Content

on:
  schedule:
    - cron: '0 2 * * *'   # 每天北京时间 10:00 (UTC 2:00)
  workflow_dispatch:       # 也可手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Bilibili popular videos
        run: |
          python -c "
import urllib.request, json
url = 'https://api.bilibili.com/x/web-interface/popular'
headers = {'User-Agent': 'Mozilla/5.0', 'Referer': 'https://www.bilibili.com/'}
req = urllib.request.Request(url, headers=headers)
r = urllib.request.urlopen(req, timeout=15)
data = json.loads(r.read())
videos = []
for v in data['data']['list']:
    videos.append({
        'bv': v['bvid'],
        'title': v['title'],
        'desc': ((v.get('rcmd_reason') or {}).get('content') or v.get('title') or '')[:30]
    })
print(f'Videos: {len(videos)}')
with open('daily_videos.json', 'w', encoding='utf-8') as f:
    json.dump(videos, f, ensure_ascii=False)
"
      - name: Fetch NetEase music
        run: |
          python -c "
import urllib.request, json
playlists = ['3779629', '2884035', '19723756']
headers = {'User-Agent': 'Mozilla/5.0', 'Referer': 'https://music.163.com/'}
songs = None
for pid in playlists:
    try:
        url = 'https://music.163.com/api/playlist/detail?id=' + pid
        req = urllib.request.Request(url, headers=headers)
        r = urllib.request.urlopen(req, timeout=10)
        data = json.loads(r.read())
        if data.get('code') == 200:
            tracks = data.get('result', data).get('tracks', [])
            songs = [{'id': str(t['id']), 'title': t['name'], 'artist': t['artists'][0]['name'] if t.get('artists') else '未知'} for t in tracks]
            print(f'Playlist {pid}: {len(songs)} songs')
            break
    except: pass
if songs:
    with open('daily_music.json', 'w', encoding='utf-8') as f:
        json.dump(songs, f, ensure_ascii=False)
    print('Written daily_music.json')
else:
    print('All playlists failed')
"
      - name: Commit and push
        run: |
          git config user.name "daily-update[bot]"
          git config user.email "daily-update[bot]@users.noreply.github.com"
          git add daily_videos.json daily_music.json
          git diff --quiet && git diff --staged --quiet || git commit -m "daily update $(date +%Y-%m-%d)"
          git push
