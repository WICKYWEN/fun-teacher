<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #fff3e0 100%);

}

/* 登录遮罩 */
.login-overlay {

  display: flex; align-items: center; justify-content: center;

}
.login-box {
  background: #fff; border-radius: 24px; padding: 40px;
  text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  max-width: 380px; width: 90%;
}
.login-box h2 { font-size: 1.6em; margin-bottom: 6px; color: #333; }
.login-box .sub { color: #999; font-size: 0.9em; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0;
  border-radius: 14px; font-size: 1em; outline: none;
  transition: border-color 0.3s;
}
.login-box input:focus { border-color: #42a5f5; }
.login-box .login-btn {
  margin-top: 16px; width: 100%; padding: 14px;
  border: none; border-radius: 14px;
  background: linear-gradient(135deg, #42a5f5, #1565c0);
  color: #fff; font-size: 1.1em; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
}
.login-box .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(21,101,192,0.3); }

header {
  text-align: center; padding: 16px 0 10px;

header .user-bar {

}

.user-bar .logout-btn {

  background: #fff; cursor: pointer; font-size: 0.8em; color: #999;

}

.game-area { max-width: 500px; margin: 0 auto; text-align: center; }

.score-board span { font-weight: 700; color: #ff6b6b; }
.game-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; max-width: 360px; margin: 0 auto;
}
.hole {
  aspect-ratio: 1; background: #8d6e63;
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 2.2em; cursor: pointer;
  box-shadow: inset 0 8px 12px rgba(0,0,0,0.3);
  transition: all 0.15s; position: relative; overflow: hidden;
}
.hole .mole { transition: all 0.2s; transform: translateY(100%); opacity: 0; user-select: none; }
.hole.up .mole { transform: translateY(0); opacity: 1; }

.game-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }

.game-section.active { display: block; }

.mem-grid {

.mem-card {

<script>
// ===== 日期种子 =====
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// ===== 登录 =====
const NICK_KEY = 'fun_nick';
const SCORE_KEY = 'fun_leaderboard';

// ===== 在线排行榜 (GitHub) =====
const GH_TOKEN = 'ghp_' + '9eJTCTMEPJYt' + 'KDliVuSbrcm4zD' + 'cBvx3QsHt5';
const GH_OWNER = 'WICKYWEN';
const GH_REPO = 'fun-teacher';
const GH_PATH = 'scores.json';
const GH_URL = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
const GH_RAW = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_PATH}`;

async function fetchScores() {
  try {
    const r = await fetch(GH_URL, {
      headers: { Authorization: `Bearer ${GH_TOKEN}` },
      cache: 'no-cache'
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const file = await r.json();
    const raw = atob(file.content.replace(/\s/g, ''));
    return JSON.parse(decodeURIComponent(escape(raw)));
  } catch(e) {
    console.warn('fetchScores failed, using local', e);
    return JSON.parse(localStorage.getItem(SCORE_KEY) || '[]');
  }
}

function b64encode(str) {
  // UTF-8 safe base64 encode
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

async function pushScore(newEntry) {
  const local = JSON.parse(localStorage.getItem(SCORE_KEY) || '[]');
  local.push(newEntry);
  local.sort((a, b) => b.score - a.score || a.time - b.time);
  if (local.length > 50) local.length = 50;
  localStorage.setItem(SCORE_KEY, JSON.stringify(local));

  try {
    const getR = await fetch(GH_URL, { headers: { Authorization: `Bearer ${GH_TOKEN}` } });
    const file = await getR.json();
    const remote = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\s/g, '')))));
    remote.push(newEntry);
    remote.sort((a, b) => b.score - a.score || a.time - b.time);
    const merged = remote.slice(0, 50);
    const content = b64encode(JSON.stringify(merged));
    await fetch(GH_URL, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${GH_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'score', content, sha: file.sha })
    });
    localStorage.setItem(SCORE_KEY, JSON.stringify(merged));
  } catch(e) {
    console.warn('GitHub sync failed', e);
  }
}

    return JSON.parse(decodeURIComponent(escape(raw)));
  } catch(e) {
    console.warn('fetchDailyVideos failed, using fallback', e);
    return null;
  }
}

let dailyVideos = [];

let dailyMusic = [];
async function initDaily() {
  const seed = getTodaySeed();
  const dateStr = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  document.getElementById('dailyBadge').textContent = '📅 ' + dateStr;

  const apiVideos = await fetchDailyVideos();
  const pool = apiVideos && apiVideos.length >= 6 ? apiVideos : fallbackVideos;
  dailyVideos = seededShuffle(pool, seed).slice(0, 6);
  const apiMusic = await fetchDailyMusic();
  const musicPool = apiMusic && apiMusic.length >= 12 ? apiMusic : fallbackMusic;
  dailyMusic = seededShuffle(musicPool, seed).slice(0, 12);

  renderVideos();
  initMusic();
  renderLeaderboard();
}

// ===== 游戏切换 =====
let currentGame = 'mole';
function switchGame(game) {
  currentGame = game;
  document.querySelectorAll('.game-opt').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(game)));
  document.querySelectorAll('.game-section').forEach(s => s.classList.toggle('active', s.id === 'game-' + game));
  const names = { mole: '打地鼠', memory: '记忆翻牌', bubble: '戳泡泡' };

  renderLeaderboard();
}

// ===== 打地鼠 =====
const grid = document.getElementById('gameGrid');
const scoreEl = document.getElementById('score');
let score = 0, timeLeft = 30;
let gameTimer = null, moleInterval = null, countdownInterval = null;
let isPlaying = false;

for (let i = 0; i < 9; i++) {
  const hole = document.createElement('div');
  hole.className = 'hole'; hole.dataset.idx = i;
  const mole = document.createElement('div');
  mole.className = 'mole'; mole.textContent = '🐹';
  hole.appendChild(mole);
  hole.addEventListener('click', () => whack(i));
  grid.appendChild(hole);
}

function whack(idx) {
  if (!isPlaying) return;
  const hole = grid.children[idx];
  if (hole.classList.contains('up')) {
    score++; scoreEl.textContent = score;
    hole.classList.remove('up');
    playBeep(800, 0.15);
  } else {
    score = Math.max(0, score - 1);
    scoreEl.textContent = score;
  }
}

function showMole() {
  grid.querySelectorAll('.hole').forEach(h => h.classList.remove('up'));
  const idx = Math.floor(Math.random() * 9);
  const hole = grid.children[idx];
  hole.classList.add('up');
  setTimeout(() => hole.classList.remove('up'), 800 + Math.random() * 600);
}

document.getElementById('gameStartBtn').addEventListener('click', async () => {
  if (isPlaying) {
    stopGame();
    return;
  }
  isPlaying = true;
  score = 0; timeLeft = 30;
  scoreEl.textContent = '0';
  document.getElementById('timerDisplay').textContent = '30';
  document.getElementById('gameStartBtn').textContent = '⏹ 结束游戏';
  moleInterval = setInterval(showMole, 900);
  countdownInterval = setInterval(async () => {
    timeLeft--;
    document.getElementById('timerDisplay').textContent = timeLeft;
    if (timeLeft <= 0) {
      stopGame();
      const nick = localStorage.getItem(NICK_KEY);
      await saveScore(nick, score);
      alert('⏰ 时间到！\n你的得分: ' + score);
    }
  }, 1000);
});

function stopGame() {
  clearInterval(moleInterval);
  clearInterval(countdownInterval);
  clearTimeout(gameTimer);
  isPlaying = false;
  grid.querySelectorAll('.hole').forEach(h => h.classList.remove('up'));
  document.getElementById('gameStartBtn').textContent = '🔨 开始敲地鼠！';
}

function playBeep(freq, dur) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ===== 记忆翻牌 =====
const memEmojis = ['🐱','🐶','🐰','🐼','🦊','🐸','🐵','🦋'];
let memCards = [], memFlipped = [], memLocked = false, memPairs = 0, memMoves = 0, memPlaying = false;

function initMemGrid() {
  const grid = document.getElementById('memGrid');
  grid.innerHTML = '';
  memCards = [...memEmojis, ...memEmojis];
  for (let i = memCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1)); [memCards[i], memCards[j]] = [memCards[j], memCards[i]];
  }
  memCards.forEach((emoji, idx) => {
    const card = document.createElement('div');
    card.className = 'mem-card'; card.dataset.idx = idx;
    card.addEventListener('click', () => flipCard(idx));
    grid.appendChild(card);
  });
}

function flipCard(idx) {
  if (!memPlaying || memLocked) return;
  const card = document.querySelectorAll('.mem-card')[idx];
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (memFlipped.length >= 2) return;
  card.textContent = memCards[idx]; card.classList.add('flipped');
  memFlipped.push(idx);
  if (memFlipped.length === 2) {
    memMoves++; document.getElementById('memMoves').textContent = memMoves;
    memLocked = true;
    if (memCards[memFlipped[0]] === memCards[memFlipped[1]]) {
      memFlipped.forEach(i => document.querySelectorAll('.mem-card')[i].classList.add('matched'));
      memPairs++; document.getElementById('memPairs').textContent = memPairs;
      memFlipped = []; memLocked = false;
      playBeep(660, 0.1);
      if (memPairs === 8) {
        memPlaying = false;
        const nick = localStorage.getItem(NICK_KEY);
        const sc = Math.max(100 - memMoves * 2, 10);
        saveScore(nick, sc);
        alert('🎉 全部配对成功！\n得分: ' + sc + '\n步数: ' + memMoves);
        renderLeaderboard();
      }
    } else {
      setTimeout(() => {
        memFlipped.forEach(i => { const c = document.querySelectorAll('.mem-card')[i]; c.textContent = ''; c.classList.remove('flipped'); });
        memFlipped = []; memLocked = false;
      }, 800);
    }
  }
}

document.getElementById('memStartBtn').addEventListener('click', () => {
  memPairs = 0; memMoves = 0; memFlipped = []; memLocked = false;
  document.getElementById('memPairs').textContent = '0';
  document.getElementById('memMoves').textContent = '0';
  initMemGrid(); memPlaying = true;
});

// ===== 戳泡泡 =====
let bubPlaying = false, bubScore = 0, bubLives = 3, bubTimer = null, bubGen = null;
const bubArea = document.getElementById('bubArea');
const bubColors = ['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#74c0fc','#b197fc','#f783ac'];

document.getElementById('bubStartBtn').addEventListener('click', () => {
  if (bubPlaying) {
    stopBub();
    return;
  }
  bubPlaying = true; bubScore = 0; bubLives = 3;
  document.getElementById('bubScore').textContent = '0';
  document.getElementById('bubLives').textContent = '3';
  document.getElementById('bubStartBtn').textContent = '⏹ 结束戳泡泡';
  bubArea.innerHTML = '';
  let timeLeft = 30;
  document.getElementById('bubTimer').textContent = '30';
  bubTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('bubTimer').textContent = timeLeft;
    if (timeLeft <= 0) { stopBub(); endBub(); }
  }, 1000);
  bubGen = setInterval(() => {
    if (!bubPlaying) return;
    const bub = document.createElement('div');
    const size = 30 + Math.random() * 30;
    const x = Math.random() * (bubArea.clientWidth - size);
    const color = bubColors[Math.floor(Math.random() * bubColors.length)];
    bub.className = 'bub-ball';
    Object.assign(bub.style, { width: size + 'px', height: size + 'px', left: x + 'px', bottom: '0', background: color });
    bub.textContent = '🫧';
    bub.addEventListener('click', (e) => { e.stopPropagation(); popBub(bub); });
    bubArea.appendChild(bub);
    let y = 0;
    const float = setInterval(() => {
      if (!bubPlaying || !bub.parentNode) { clearInterval(float); return; }
      y += 1.5 + Math.random();
      bub.style.bottom = y + 'px';
      if (y > bubArea.clientHeight - size) {
        clearInterval(float);
        if (bub.parentNode) { bub.remove(); missBub(); }
      }
    }, 30);
  }, 400);
});

function popBub(bub) {
  if (!bubPlaying || !bub.parentNode) return;
  bub.remove(); bubScore++;
  document.getElementById('bubScore').textContent = bubScore;
  playBeep(1200, 0.08);
}

function missBub() {
  if (!bubPlaying) return;
  bubLives--; document.getElementById('bubLives').textContent = bubLives;
  if (bubLives <= 0) { stopBub(); endBub(); }
}

function stopBub() {
  bubPlaying = false;
  clearInterval(bubTimer); clearInterval(bubGen);
  bubArea.querySelectorAll('.bub-ball').forEach(b => b.remove());
  document.getElementById('bubStartBtn').textContent = '🫧 开始戳泡泡';
}

function endBub() {
  const nick = localStorage.getItem(NICK_KEY);
  saveScore(nick, bubScore);
  renderLeaderboard();
  alert('⏰ 游戏结束！\n戳破泡泡: ' + bubScore);
}

// ===== 排行榜 =====
async function saveScore(nick, sc) {
  await pushScore({ nick, score: sc, time: Date.now(), game: currentGame });
  renderLeaderboard();
}

async function renderLeaderboard() {
  const all = await fetchScores();
  const data = all.filter(d => (d.game || 'mole') === currentGame);
  const table = document.getElementById('rankTable');
  const medals = ['🥇', '🥈', '🥉'];
  const gameNames = { mole: '打地鼠', memory: '记忆翻牌', bubble: '戳泡泡' };
  if (!data.length) {
    table.innerHTML = '<tr><td class="empty" colspan="3">还没有' + gameNames[currentGame] + '记录，快来玩吧！</td></tr>';
    return;
  }
  const top = data.slice(0, 10);
  table.innerHTML = top.map((item, i) => `<tr>
    <td class="rank ${i < 3 ? 'medal' : ''}">${i < 3 ? medals[i] : '#' + (i+1)}</td>
    <td class="name">${escHtml(item.nick)}</td>
    <td class="sc">${item.score}</td>
  </tr>`).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s; return d.innerHTML;
}

}

async function fetchDailyMusic() {
  try {
    const r = await fetch(MUSIC_API, {
      headers: { Authorization: `Bearer ${GH_TOKEN}` },
      cache: 'no-cache'
    });

    const file = await r.json();
    const raw = atob(file.content.replace(/\s/g, ''));
    return JSON.parse(decodeURIComponent(escape(raw)));

    return null;

function showRainbow() {

  let hue = 0;
  rainbowInterval = setInterval(() => {
    body.style.background = `linear-gradient(135deg, hsl(${hue}, 70%, 90%), hsl(${hue + 60}, 70%, 90%), hsl(${hue + 120}, 70%, 90%))`;
